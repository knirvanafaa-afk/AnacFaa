<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulado FAA - Modo Prova</title>
    <style>
        /* CSS HERDADO DO SEU PROVA.HTML */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); }
        h2 { background-color: #27ae60; color: white; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        
        .pergunta-card { border: 2px solid #3498db; padding: 20px; border-radius: 15px; background-color: #f4faff; margin-bottom: 20px; }
        .texto-enunciado { font-weight: bold; font-size: 18px; margin-bottom: 20px; color: #2c3e50; }
        
        /* BOTÕES */
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #3498db; color: white; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #btn-flag { background: #f39c12; }
        #btn-flag.active { background: #e67e22; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #btn-finish { background: #e74c3c; }

        /* TELA RESULTADO */
        #result-screen { display: none; text-align: center; padding: 40px; }
        .status-box { padding: 30px; border-radius: 15px; font-size: 40px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .passed { background-color: #2ecc71; color: white; }
        .failed { background-color: #e74c3c; color: white; }

/* Container da grade de revisão */
#review-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
    gap: 10px;
    margin: 20px 0;
}

/* Quadrados de cada questão */
.review-item {
    padding: 10px;
    border-radius: 5px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid #ccc;
    background: #ecf0f1;
}

/* Estados da questão */
.status-answered { background-color: #27ae60; color: white; border-color: #2ecc71; }
.status-flagged { background-color: #f39c12; color: white; border-color: #e67e22; }
.status-unanswered { background-color: #bdc3c7; color: white; }

    </style>
</head>
<body>

<div class="container">
    <h2>Simulado FAA</h2>
    
    <div id="exam-screen">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold;">
            <span id="q-counter">Question 1 of 60</span>
            <span id="timer" style="color: #c0392b;">02:00:00</span>
        </div>

        <div class="pergunta-card">
            <div id="question-text" class="texto-enunciado">Carregando...</div>
            <div id="options-container"></div>
        </div>
<div id="review-screen" style="display:none;">
    <h2>REVIEW EXAM</h2>
    <p>Clique em uma questão para revisar ou finalize abaixo:</p>
    
    <div id="review-grid"></div>

    <div class="nav-bar" style="margin-top:20px;">
        <button onclick="hideReview()" style="background:#7f8c8d;">BACK TO EXAM</button>
        <button onclick="confirmFinish()" style="background:#e74c3c;">SUBMIT & FINISH</button>
    </div>
</div>
        <div class="nav-bar">
            <button onclick="changeQuestion(-1)">BACK</button>
            <button id="btn-flag" onclick="toggleFlag()">🚩 FLAG</button>
            <button onclick="changeQuestion(1)">NEXT</button>
            <button id="btn-finish" onclick="finishExam()">FINISH</button>
        </div>
    </div>

    <div id="result-screen">
        <div id="status-text" class="status-box">PASSED</div>
        <div style="font-size: 24px; margin-bottom: 20px;">
            SCORE: <span id="final-score">0/0</span><br>
            TIME: <span id="final-time">00:00</span>
        </div>
        <button style="width: 100%; background: #2c3e50;" onclick="window.location.href='dashboard.html'">RETURN TO DASHBOARD</button>
    </div>
</div>

<script>
    // --- VARIÁVEIS DE ESTADO ---
    let currentIdx = 0;
    let answers = {}; // { index: resposta_selecionada }
    let flags = {};   // { index: true/false }
    let timeLeft = 120 * 60; // 2 horas (ou ajustar conforme matéria)
    
    // --- DADOS (Substitua depois pelo seu array real) ---
    const questions = [
        { q: "What is the main purpose of a rectifier?", a: ["Voltage UP", "Voltage DOWN", "AC to DC", "DC to AC"], correct: 2 },
        { q: "Which tool measures wire diameter?", a: ["Micrometer", "Scale", "Tachometer", "Voltmeter"], correct: 0 }
    ];

    // --- LÓGICA DO TIMER ---
    const timerInterval = setInterval(() => {
        timeLeft--;
        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = timeLeft % 60;
        document.getElementById('timer').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(timeLeft <= 0) finishExam();
    }, 1000);

    // --- LÓGICA DE NAVEGAÇÃO ---
    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        let html = '';
        q.a.forEach((opt, i) => {
            let checked = (answers[currentIdx] === i) ? 'checked' : '';
            html += `<label style="display:block; padding:8px; cursor:pointer;">
                        <input type="radio" name="ans" value="${i}" ${checked} onchange="saveAnswer(${i})"> ${opt}
                     </label>`;
        });
        document.getElementById('options-container').innerHTML = html;
        updateFlagButton();
    }

    function saveAnswer(i) { answers[currentIdx] = i; }

    function toggleFlag() {
        flags[currentIdx] = !flags[currentIdx];
        updateFlagButton();
    }

    function updateFlagButton() {
        const btn = document.getElementById('btn-flag');
        btn.className = flags[currentIdx] ? 'active' : '';
        btn.innerText = flags[currentIdx] ? "🚩 FLAGGED" : "🚩 FLAG";
    }

    function changeQuestion(dir) {
        if (currentIdx + dir >= 0 && currentIdx + dir < questions.length) {
            currentIdx += dir;
            loadQuestion();
        }
    }

    // --- FINALIZAÇÃO ---
    function finishExam() {
        clearInterval(timerInterval);
        let score = 0;
        questions.forEach((q, i) => { if(answers[i] === q.correct) score++; });
        

// 1. Função que mostra a tela de revisão
function showReview() {
    document.getElementById('exam-screen').style.display = 'none';
    document.getElementById('review-screen').style.display = 'block';
    
    const grid = document.getElementById('review-grid');
    grid.innerHTML = ''; // Limpa antes de popular

    questions.forEach((q, i) => {
        const item = document.createElement('div');
        item.className = 'review-item';
        
        // Define a classe baseado no status
        if(flags[i]) item.classList.add('status-flagged');
        else if(answers[i] !== undefined) item.classList.add('status-answered');
        else item.classList.add('status-unanswered');
        
        item.innerText = i + 1;
        item.onclick = () => goToQuestion(i);
        grid.appendChild(item);
    });
}

// 2. Função para voltar do Review para uma questão específica
function goToQuestion(index) {
    currentIdx = index;
    document.getElementById('review-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = 'block';
    loadQuestion();
}

// 3. Função para esconder a tela de revisão (voltar sem selecionar)
function hideReview() {
    document.getElementById('review-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = 'block';
}

// 4. Mude sua função finishExam para chamar a review primeiro
function finishExam() {
    // Agora o botão de FINISH abre a revisão
    showReview();
}

// 5. Nova função para realmente encerrar tudo (chamada dentro da tela de review)
function confirmFinish() {
    if(confirm("Deseja realmente finalizar a prova?")) {
        // Lógica de cálculo que você já tinha no final do script
        processFinalResult(); // Mova seu código de cálculo para cá
    }
}

   function confirmFinish() {
    // 1. Criar um array para guardar os números das questões não respondidas
    const unanswered = [];
    
    for (let i = 0; i < questions.length; i++) {
        // Verifica se a questão está vazia ou indefinida
        if (answers[i] === undefined || answers[i] === null) {
            unanswered.push(i + 1); // Soma 1 para o índice ficar legível (1, 2, 3...)
        }
    }

    // 2. Decisão baseada no resultado
    if (unanswered.length > 0) {
        // Se houver questões em branco, mostra um aviso detalhado
        const msg = `ATENÇÃO: Ainda tem questões por responder: ${unanswered.join(', ')}. \n\nTem a certeza que deseja finalizar mesmo assim?`;
        
        if (!confirm(msg)) {
            // Se o utilizador clicar em "Cancelar", voltamos à tela de revisão
            // ou podemos voltar direto para a primeira questão pendente
            alert("A voltar para a revisão...");
            return; // Interrompe a finalização
        }
    } else {
        // Se estiver tudo respondido
        if (!confirm("Tem a certeza que deseja finalizar a prova? Não poderá alterar as respostas depois.")) {
            return;
        }
    }

    // 3. Se passou pelos avisos, processa o resultado final
    processFinalResult();
}

// Criámos esta função para centralizar o processamento do resultado
function processFinalResult() {
    clearInterval(timerInterval); // Para o cronómetro
    let score = 0;
    
    // Cálculo da nota
    questions.forEach((q, i) => { 
        if(answers[i] === q.correct) score++; 
    });
    
    // Esconde as telas de prova e revisão
    document.getElementById('exam-screen').style.display = 'none';
    document.getElementById('review-screen').style.display = 'none';
    
    // Mostra a tela de resultado
    document.getElementById('result-screen').style.display = 'block';
    
    const passed = (score/questions.length) >= 0.7; // Exemplo de nota de corte (70%)
    const statusEl = document.getElementById('status-text');
    
    statusEl.innerText = passed ? "PASSED" : "FAILED";
    statusEl.className = `status-box ${passed ? 'passed' : 'failed'}`;
    document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
    document.getElementById('final-time').innerText = document.getElementById('timer').innerText;
}

        document.getElementById('result-screen').style.display = 'block';
        
        const passed = (score/questions.length) >= 0.7;
        const statusEl = document.getElementById('status-text');
        statusEl.innerText = passed ? "PASSED" : "FAILED";
        statusEl.className = `status-box ${passed ? 'passed' : 'failed'}`;
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        document.getElementById('final-time').innerText = document.getElementById('timer').innerText;
    }

    loadQuestion();
</script>
</body>
</html>
