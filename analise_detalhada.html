<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Detalhada - WXR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #2c3e50; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #fff9c4; border: 2px solid #f1c40f; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-duplo { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 600px) { .grid-duplo { grid-template-columns: 1fr 1fr; } }
        h3 { border-left: 5px solid #27ae60; padding-left: 10px; font-size: 16px; text-transform: uppercase; }

.btn-voltar {
    background-color: #27ae60; /* O VERDE EXATO DO BANCO.HTML */
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0px 4px 0px #1e8449; /* SOMBRA DE BOTÃO 3D IGUAL AO BANCO */
    transition: 0.1s;
    margin-bottom: 25px;
    text-decoration: none;
}

.btn-voltar:active {
    transform: translateY(3px); /* EFEITO DE AFUNDAR AO CLICAR */
    box-shadow: 0px 1px 0px #1e8449;
}
    </style>
</head>
<body>

<button class="btn-voltar" onclick="window.location.href='dashboard.html'">⬅ Voltar
</button>

    <div class="header">
        <h2 style="margin:0">Diagnóstico de Performance</h2>
        <p style="margin:5px 0 0; font-weight:bold; color: #7f8c8d;">Análise em tempo real do seu banco de dados</p>
    </div>

    <div class="card">
        <h3>Desempenho Geral</h3>
        <div class="grid-duplo">
            <div style="max-width: 250px; margin: 0 auto;"><canvas id="chartRosca"></canvas></div>
            <div><canvas id="chartBarrasGeral"></canvas></div>
        </div>
    </div>

<div class="card">
    <h3>Média por Habilitação</h3>
    
    <div style="text-align: center; margin-bottom: 15px;">
        <span style="font-size: 14px; font-weight: bold; color: #2c3e50;">
            Média %
        </span>
    </div>

    <canvas id="chartMateriasH"></canvas>
</div>

    <div class="card">
        <h3>Top Capítulos (Acertos vs Erros)</h3>
        <canvas id="chartCapitulos"></canvas>
    </div>

    <div class="card">
        <h3>Linha de Tendência (Evolução)</h3>
        <canvas id="chartLinhas"></canvas>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

    async function carregarAnalise() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        const { data: historico } = await supabase
            .from('historico_simulados')
            .select('*')
            .order('data_hora', { ascending: true });

        if (!historico || historico.length === 0) return;

        // --- PROCESSAMENTO DOS DADOS ---
        let totalAcertos = 0, totalErros = 0;
        let matDados = { General: { a:0, t:0 }, Airframe: { a:0, t:0 }, Powerplant: { a:0, t:0 } };
        let capDados = {};

        historico.forEach(h => {
            totalAcertos += h.acertos;
            totalErros += h.erros;
            
            if(matDados[h.materia]) {
                matDados[h.materia].a += h.acertos;
                matDados[h.materia].t += h.total_questoes;
            }

            // Agrupa por capítulo
            if(!capDados[h.capitulo]) capDados[h.capitulo] = { a:0, e:0 };
            capDados[h.capitulo].a += h.acertos;
            capDados[h.capitulo].e += h.erros;
        });

        // 1. Gráfico Rosca (Mabel) - APENAS PORCENTAGEM
        new Chart(document.getElementById('chartRosca'), {
            type: 'doughnut',
            data: {
                labels: ['Acertos %', 'Erros %'],
                datasets: [{
                    // Aqui fazemos o cálculo da porcentagem
                    data: [
                        ((totalAcertos / (totalAcertos + totalErros)) * 100).toFixed(1),
                        ((totalErros / (totalAcertos + totalErros)) * 100).toFixed(1)
                    ],
                    backgroundColor: ['#27ae60', '#e74c3c'],
                    borderWidth: 2
                }]
            },
            options: { 
                plugins: { 
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                // Força a exibição do símbolo % no balãozinho ao tocar
                                return context.label + ': ' + context.raw + '%';
                            }
                        }
                    }
                } 
            }
        });
        // 1b. Barras Geral (Números Reais)
        new Chart(document.getElementById('chartBarrasGeral'), {
            type: 'bar',
            data: {
                labels: ['Número de Questões'],
                datasets: [
                    { label: 'Acertos', data: [totalAcertos], backgroundColor: '#27ae60' },
                    { label: 'Erros', data: [totalErros], backgroundColor: '#e74c3c' }
                ]
            }
        });

        // 2. Médias por Matéria
// 2. Médias por Matéria (CORRIGIDO)
        new Chart(document.getElementById('chartMateriasH'), {
            type: 'bar',
            data: {
                labels: ['General', 'Airframe', 'Powerplant'],
                datasets: [{
                    label: 'Média %',
                    data: [
                        (matDados.General.t > 0 ? (matDados.General.a / matDados.General.t * 100).toFixed(1) : 0),
                        (matDados.Airframe.t > 0 ? (matDados.Airframe.a / matDados.Airframe.t * 100).toFixed(1) : 0),
                        (matDados.Powerplant.t > 0 ? (matDados.Powerplant.a / matDados.Powerplant.t * 100).toFixed(1) : 0)
                    ],
                    backgroundColor: ['#3498db', '#e74c3c', '#27ae60']
                }]
            },
            options: { 
                indexAxis: 'y', 
                scales: { 
                    x: { max: 100 } 
                }, 
                plugins: { 
                    legend: { display: false } // LEGENDA DESLIGADA CORRETAMENTE
                } 
            }
        });

        // 3. Capítulos (Top 5)
        const sortedCaps = Object.keys(capDados).slice(0,7);
        new Chart(document.getElementById('chartCapitulos'), {
            type: 'bar',
            data: {
                labels: sortedCaps,
                datasets: [
                    { label: 'Acertos', data: sortedCaps.map(c => capDados[c].a), backgroundColor: '#27ae60' },
                    { label: 'Erros', data: sortedCaps.map(c => capDados[c].e), backgroundColor: '#e74c3c' }
                ]
            },
            options: { indexAxis: 'y' }
        });

        // 4. Evolução (Linhas)
        new Chart(document.getElementById('chartLinhas'), {
            type: 'line',
            data: {
                labels: historico.map((_, i) => i + 1),
                datasets: [
                    { label: 'Nota %', data: historico.map(h => h.nota), borderColor: '#f1c40f', tension: 0.3 }
                ]
            }
        });
    }

    carregarAnalise();
</script>
</body>
</html>
