<!DOCTYPE html>
<html lag="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Detalhada - WXR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #2c3e50; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #fff9c4; border: 2px solid #f1c40f; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-duplo { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 600px) { .grid-duplo { grid-template-columns: 1fr 1fr; } }
        h3 { border-left: 5px solid #27ae60; padding-left: 10px; font-size: 16px; text-transform: uppercase; }

        .btn-voltar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 80px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0px 4px 0px #1e8449;
            transition: 0.1s;
            margin-bottom: 25px;
            text-decoration: none;
        }

        .btn-voltar:active {
            transform: translateY(3px);
            box-shadow: 0px 1px 0px #1e8449;
        }
    </style>
</head>
<body>

<div style="text-align: center; width: 100%;">
<button class="btn-voltar" onclick="window.location.href='dashboard.html'">⬅ Voltar</button></div>

<div class="header">
    <h2 style="margin:0">Diagnóstico de Performance</h2>
    <p style="margin:5px 0 0; font-weight:bold; color: #7f8c8d;">Análise em tempo real de Simulados e Provas realizados</p>
</div>

<div class="card">
    <h3>Desempenho Geral</h3>
    <div class="grid-duplo">
        <div style="max-width: 250px; margin: 0 auto;"><canvas id="chartRosca"></canvas></div>
        <div><canvas id="chartBarrasGeral"></canvas></div>
    </div>
</div>

<div class="card">
    <h3>Média por Habilitação</h3>
    <div style="text-align: center; margin-bottom: 15px;">
        <span style="font-size: 14px; font-weight: bold; color: #2c3e50;">Média de Acertos %</span>
    </div>
    <canvas id="chartMateriasH"></canvas>
</div>

<div class="card">
    <h3>Top 7 Capítulos - Acertos</h3>
    <canvas id="chartAcertos"></canvas>
</div>
<div class="card">
    <h3>Top 7 Capítulos - Erros</h3>
    <canvas id="chartErros"></canvas>
</div>

<div class="card">
    <h3>Linha de Tendência (Evolução)</h3>
    <canvas id="chartLinhas"></canvas>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

import { validarAcessoTotal } from './seguranca.js';  

const supabase = createClient(
    'https://ymyxikhlhkkvcufgwufe.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA'
);

async function iniciarPagina() { 
await validarAcessoTotal(false); carregarAnalise(); 
}

async function carregarAnalise() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;

    // Buscamos tudo de uma vez. A tabela 'questoes' só é consultada se necessário.
    const [{ data: historico }, { data: questoes }] = await Promise.all([
        supabase.from('historico_simulados').select('*').order('data_hora', { ascending: true }),
        supabase.from('questoes').select('num, capitulo')
    ]);

    if (!historico || historico.length === 0) return;

    // Criamos o mapa de capítulos de forma eficiente
    const mapaCapitulos = (questoes || []).reduce((acc, q) => {
        acc[q.num] = q.capitulo;
        return acc;
    }, {});

    // Processamento centralizado
    let totalAcertos = 0, totalErros = 0;
    const matDados = { General: { a: 0, t: 0 }, Airframe: { a: 0, t: 0 }, Powerplant: { a: 0, t: 0 } };
    const capDados = {};

    historico.forEach(h => {
        const acertos = h.acertos || 0;
        const total = h.total_questoes || 0;
        const erros = total - acertos;

        totalAcertos += acertos;
        totalErros += erros;

        // Dados por matéria
        if (matDados[h.materia]) {
            matDados[h.materia].a += acertos;
            matDados[h.materia].t += total;
        }

        // Correção inteligente de capítulo
        const idBusca = h.id_questao || h.num || h.questao || h.questao_id;
        const capReal = ['OUTROS', 'N/A', 'n/a', 'todos', 'TODOS', null, undefined].includes(h.capitulo)
            ? (mapaCapitulos[idBusca] || 'Outros')
            : h.capitulo;

        if (!capDados[capReal]) capDados[capReal] = { a: 0, e: 0 };
        capDados[capReal].a += acertos;
        capDados[capReal].e += erros;
    });

    // Função auxiliar para evitar divisão por zero nos gráficos
    const calcPerc = (a, t) => (t > 0 ? ((a / t) * 100).toFixed(1) : 0);

    // GRÁFICO ROSCA
    new Chart(document.getElementById('chartRosca'), {
        type: 'doughnut',
        data: {
            labels: ['% Acertos', '% Erros'],
            datasets: [{
                data: [calcPerc(totalAcertos, totalAcertos + totalErros), calcPerc(totalErros, totalAcertos + totalErros)],
                backgroundColor: ['#27ae60', '#e74c3c'],
                borderWidth: 2
            }]
        },
        options: { plugins: { legend: { position: 'top' } } },
        plugins: [{
            id: 'textCenter',
            beforeDraw: (chart) => {
                const { ctx, width, height } = chart;
                ctx.restore();
                ctx.font = 'bold 24px Segoe UI';
                ctx.fillStyle = '#2c3e50';
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                const total = totalAcertos + totalErros;
                ctx.fillText(total > 0 ? ((totalAcertos / total) * 100).toFixed(0) + '%' : '0%', width / 2 + 6, height / 2 + 15);
                ctx.save();
            }
        }]
    });

    // BARRAS GERAL
    new Chart(document.getElementById('chartBarrasGeral'), {
        type: 'bar',
        data: {
            labels: ['Número de Questões'],
            datasets: [
                { label: ' N° Acertos', data: [totalAcertos], backgroundColor: '#27ae60' },
                { label: 'N° Erros', data: [totalErros], backgroundColor: '#e74c3c' }
            ]
        }
    });

    // MÉDIA POR MATÉRIA
    new Chart(document.getElementById('chartMateriasH'), {
        type: 'bar',
        data: {
            labels: ['General', 'Airframe', 'Powerplant'],
            datasets: [{
                label: 'Média %',
                data: [calcPerc(matDados.General.a, matDados.General.t), calcPerc(matDados.Airframe.a, matDados.Airframe.t), calcPerc(matDados.Powerplant.a, matDados.Powerplant.t)],
                backgroundColor: ['#3498db', '#e74c3c', '#27ae60']
            }]
        },
        options: { indexAxis: 'y', scales: { x: { max: 100 } }, plugins: { legend: { display: false } } }
    });

 // --- TOP 7 CAPÍTULOS ACERTOS ---
// Ordenamos pelo número de acertos (a) do maior para o menor e pegamos os 7 primeiros
const top7Acertos = Object.keys(capDados)
    .sort((a, b) => capDados[b].a - capDados[a].a)
    .slice(0, 7);

new Chart(document.getElementById('chartAcertos'), {
    type: 'bar',
    data: { 
        labels: top7Acertos, 
        datasets: [{ 
            label: 'N° de Questões Corretas', 
            data: top7Acertos.map(c => capDados[c].a), 
            backgroundColor: '#27ae60',
            barPercentage: 0.8, // Ajusta a largura da barra para evitar o "gap"
            categoryPercentage: 0.9
        }] 
    },
    options: { 
        indexAxis: 'y', 
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: {
                ticks: { autoSkip: false } // Garante que todos os 7 nomes apareçam alinhados
            }
        }
    }
});

// --- TOP 7 CAPÍTULOS ERROS ---
// Ordenamos pelo número de erros (e) do maior para o menor e pegamos os 7 primeiros
const top7Erros = Object.keys(capDados)
    .sort((a, b) => capDados[b].e - capDados[a].e)
    .slice(0, 7);

new Chart(document.getElementById('chartErros'), {
    type: 'bar',
    data: { 
        labels: top7Erros, 
        datasets: [{ 
            label: 'N° de Questões Erradas', 
            data: top7Erros.map(c => capDados[c].e), 
            backgroundColor: '#e74c3c',
            barPercentage: 0.8,
            categoryPercentage: 0.9
        }] 
    },
    options: { 
        indexAxis: 'y', 
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: {
                ticks: { autoSkip: false }
            }
        }
    }
});

  // EVOLUÇÃO
    const datasets = ['General', 'Airframe', 'Powerplant'].map((mat, i) => ({
        label: mat,
        data: historico.filter(h => h.materia === mat).map(h => h.nota),
        borderColor: ['#3498db', '#e74c3c', '#27ae60'][i],
        backgroundColor: ['#3498db', '#e74c3c', '#27ae60'][i],
        tension: 0,
        pointRadius: 3,
        borderWidth: 2,
        fill: false
    }));

    new Chart(document.getElementById('chartLinhas'), {
        type: 'line',
        data: {
            labels: Array.from({ length: Math.max(0, ...datasets.map(d => d.data.length)) }, (_, i) => i + 1),
            datasets: datasets
        },
        options: {
            aspectRatio: 1.5,
            responsive: true,
            plugins: {
                legend: {
                    display: true,
                    position: 'top', 
                    labels: {
                        usePointStyle: false,
                        pointStyle: 'rect', 
                        boxWidth: 20,     
                        boxHeight: 12,     
                        generateLabels: (chart) => {
                            return chart.data.datasets.map((dataset, i) => ({
                                text: dataset.label,
                                fillStyle: dataset.backgroundColor, // Cor sólida interna
                                strokeStyle: dataset.borderColor,   // Cor da borda
                                lineWidth: 2,                       // Espessura da borda
                                hidden: !chart.isDatasetVisible(i),
                                datasetIndex: i
                            }));
                        }
                    }
                }
            },
            scales: {
                y: { min: 0, max: 100, title: { display: true, text: 'Nota %' } },
                x: { title: { display: true, text: 'Simulado Nº' } }
            }
        }
    });
}

iniciarPagina();

</script>
</body>
</html>
