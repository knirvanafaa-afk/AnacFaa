<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado Geral</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        /* MANTENDO TODO O SEU ESTILO ORIGINAL */
        body { background-color: #f4f4f4; margin: 0; padding: 0; }

/* AJUSTE DE TELA AUTOMÁTICO */
@media screen and (max-width: 1050px) {
    body {
        /* Faz o certificado se ajustar à largura da tela */
        zoom: 0.8; /* Diminui para 80% em telas menores */
        -moz-transform: scale(0.8); /* Ajuste para Firefox */
        -moz-transform-origin: top center;
    }
}

@media screen and (max-width: 850px) {
    body {
        zoom: 0.4; /* Diminui para 40% em telas de celular/tablets */
        -moz-transform: scale(0.4);
        -moz-transform-origin: top center;
    }
}

        .certificado-container {
            width: 1000px;
            height: 700px;
            background-color: #fff;
            padding: 20px;
            margin: 20px auto;
            border: 1px solid #ccc;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .moldura-tripla {
            width: 100%;
            height: 100%;
            border: 2px solid #002366;
            padding: 4px;
            box-sizing: border-box;
            position: relative;
        }

        .moldura-meio {
            width: 100%;
            height: 100%;
            border: 8px solid #002366;
            padding: 4px;
            box-sizing: border-box;
        }

        .moldura-interna {
            width: 100%;
            height: 100%;
            border: 2px solid #002366;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 60px;
            box-sizing: border-box;
            position: relative;
        }

        .selo-imagem {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 110px;
            height: auto;
            mix-blend-mode: multiply; 
            filter: none !important; 
            z-index: 2;
        }

 .selo-circulo-cor { 
       position: absolute; 
       width: 100px; 
       height: 100px; 
       border-radius: 50%; 
       z-index: 1; 
       transition: background-color 0.3s;
 }

        .moldura-interna::before {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            border-top: 15px solid #002366;
            border-right: 15px solid #002366;
        }

        .moldura-interna::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 100px; height: 100px;
            border-bottom: 15px solid #002366;
            border-left: 15px solid #002366;
        }

/* --- APENAS CORES (Sem mexer em posição) --- */

/* TEMA AIRFRAME (Vermelho) */
.tema-Airframe .moldura-tripla, 
.tema-Airframe .moldura-meio, 
.tema-Airframe .moldura-interna { border-color: #e74c3c !important; }

.tema-Airframe .moldura-interna::before, 
.tema-Airframe .moldura-interna::after { border-color: #e74c3c !important; }

.tema-Airframe h1, 
.tema-Airframe .materia-destaque { color: #e74c3c !important; }

.tema-Airframe .linha-azul { background-color: #e74c3c !important; }

.tema-Airframe .selo-imagem { filter: hue-rotate(155deg) saturate(4) brightness(1.1) contrast(1.1) !important; }


/* TEMA POWERPLANT (Verde) */
.tema-Powerplant .moldura-tripla, 
.tema-Powerplant .moldura-meio, 
.tema-Powerplant .moldura-interna { border-color: #27ae60 !important; }

.tema-Powerplant .moldura-interna::before, 
.tema-Powerplant .moldura-interna::after { border-color: #27ae60 !important; }

.tema-Powerplant h1, 
.tema-Powerplant .materia-destaque { color: #27ae60 !important; }

.tema-Powerplant .linha-azul { background-color: #27ae60 !important; }

.tema-Powerplant .selo-imagem { filter: hue-rotate(255deg) saturate(2.5) brightness(1.2) contrast(1) !important; }

/* TEMA BRONZE (Cobre) */
.tema-Bronze .moldura-tripla, .tema-Bronze .moldura-meio, .tema-Bronze .moldura-interna { border-color: #cd7f32 !important; }
.tema-Bronze .moldura-interna::before, .tema-Bronze .moldura-interna::after { border-color: #cd7f32 !important; }
.tema-Bronze h1, .tema-Bronze .materia-destaque { color: #cd7f32 !important; }
.tema-Bronze .linha-azul { background-color: #cd7f32 !important; }
.tema-Bronze .selo-imagem { filter: hue-rotate(164deg) saturate(1) brightness(2.3) contrast(2) !important; mix-blend-mode: multiply !important; }

/* TEMA SILVER (Prata) */
.tema-Silver .moldura-tripla, .tema-Silver .moldura-meio, .tema-Silver .moldura-interna { border-color: #95a5a6 !important; }
.tema-Silver .moldura-interna::before, .tema-Silver .moldura-interna::after { border-color: #95a5a6 !important; }
.tema-Silver h1, .tema-Silver .materia-destaque { color: #7f8c8d !important; }
.tema-Silver .linha-azul { background-color: #95a5a6 !important; }
.tema-Silver .selo-imagem { filter: grayscale(1) brightness(1.2) !important; }

/* TEMA GOLD (Dourado) */
.tema-Gold .moldura-tripla, .tema-Gold .moldura-meio, .tema-Gold .moldura-interna { border-color: #f1c40f !important; }
.tema-Gold .moldura-interna::before, .tema-Gold .moldura-interna::after { border-color: #f1c40f !important; }
.tema-Gold h1, .tema-Gold .materia-destaque { color: #d4ac0d !important; }
.tema-Gold .linha-azul { background-color: #f1c40f !important; }
.tema-Gold .selo-imagem { filter: hue-rotate(177deg) saturate(3) brightness(4.2) contrast(2.5) !important; mix-blend-mode: multiply !important; }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            letter-spacing: 8px;
            color: #002366;
            margin: none;
            margin-top: 50px;
            text-transform: uppercase;
        }

        .subtitulo {
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            margin-top: 5px;
            color: #333;
        }

        .nome-aluno {
            font-family: 'Pinyon Script', cursive;
            font-size: 65px;
            color: #000;
            margin: 10px 0 5px 0;
        }

        .linha-azul {
            width: 80%;
            height: 2px;
            background-color: #002366;
            margin-bottom: 30px;
        }

        .texto-conclusao {
            font-family: 'Libre Baskerville', serif;
            font-size: 18px;
            text-align: center;
            max-width: 800px;
            line-height: 1.6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .materia-destaque {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 22px;
            display: block;
            width: 100%;
            text-align: right;
            margin-top: 20px;
            color: #002366;
        }

        .footer-dados {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            font-family: 'Libre Baskerville', serif;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        /* Botão para o aluno imprimir/salvar em PDF */
        .btn-imprimir {
            font-size: 16px;
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #002366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
        }

        @media print {
            .btn-imprimir { display: none; }
            body { background: white; }
            .certificado-container { margin: 0; box-shadow: none; border: none; }
        }
/* CSS para forçar a quebra de página no PDF */
@media print {
    .quebra-pagina {
        page-break-after: always;
        height: 0;
        margin: 0;
        border: none;
    }
}

/* Estilo do container do Verso para ser idêntico à Frente */
.verso-container {
    width: 1000px;
    height: 700px;
    background-color: #fff;
    padding: 20px;
    margin: 20px auto;
    border: 1px solid #ccc; /* Fica invisível no print */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
}

/* Container que dá a profundidade */
.flip-card {
    background-color: transparent;
    width: 1000px;
    height: 700px;
    perspective: 1500px; 
    margin: 20px auto;
}

/* O "papel" que contém a frente e o verso */
.flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
}

/* Quando o botão for clicado, ele adiciona essa classe e gira */
.flip-card.girar .flip-card-inner {
    transform: rotateY(180deg);
}

/* Faz a Frente e o Verso ocuparem o mesmo lugar exato */
#printable, #verso-layout {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    margin: 0 !important;
}

/* O Verso começa virado para trás */
#verso-layout {
    transform: rotateY(180deg);
}

    </style>
</head>

<body>

<div class="flip-card" id="card-principal">
    <div class="flip-card-inner">
        
        <div class="certificado-container" id="printable">
            <div class="moldura-tripla">
                <div class="moldura-meio">
                    <div class="moldura-interna">
                        <img src="selo.jpg" class="selo-imagem" id="selo-dinamico"> 
                        <div style="height: 60px;"></div>
                        <h1>Certificado de Estudos</h1>
                        <p class="subtitulo">Certificamos que</p>
                        <div class="nome-aluno" id="cert-nome-aluno">Carregando...</div>
                        <div class="linha-azul"></div>
                        <div class="texto-conclusao">
                            demonstrou com sucesso proficiência profissional ao concluir todos as provas e simulações teóricas exigidas para o módulo de:
                            <span class="materia-destaque" id="cert-materia">FAA Aviation Mechanic</span>
                        </div>
                        <div class="footer-dados">
                            <div><strong>EMITIDO EM:</strong> <span id="cert-data">--/--/----</span></div>
                            <div><strong>MÉDIA FINAL:</strong> <span id="cert-media">--</span>%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="certificado-container verso-container" id="verso-layout">
            <div class="moldura-tripla">
                <div class="moldura-meio">
                    <div class="moldura-interna" style="padding: 30px;">
                        <h2 style="font-family: 'Cinzel'; letter-spacing: 4px; text-align: center;">Histórico de Estudos</h2>
                        <div id="tabela-dinamica" style="width: 100%; margin-top: 20px;">
                            </div>
                        <div class="footer-dados" style="margin-top: auto;">
                            <div id="texto-logbook" style="font-size: 12px; text-align: justify; line-height: 1.4;">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div style="text-align: center; margin-top: 20px;">

    <button class="btn-imprimir" onclick="document.getElementById('card-principal').classList.toggle('girar')">
        🔄 VER VERSO / FRENTE
    </button>

    <button class="btn-imprimir" onclick="window.print()">Salvar como PDF / Imprimir</button>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { validarAcessoTotal } from './seguranca.js';

    // 1. Inicialização
    validarAcessoTotal(false);
    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const materiaRaw = urlParams.get('materia') || 'General';
    const media = urlParams.get('media') || '0';
    const nomeURL = urlParams.get('nome');

    const materiasFormatadas = {
        'General': 'FAA Aviation Mechanic — GENERAL',
        'Airframe': 'FAA Aviation Mechanic — AIRFRAME',
        'Powerplant': 'FAA Aviation Mechanic — POWERPLANT',
        'Bronze': 'FAA Aviation Mechanic — BRONZE MERIT', 
        'Silver': 'FAA Aviation Mechanic — SILVER MERIT', 
        'Gold': 'FAA Aviation Mechanic — GOLD MERIT' 
    };

    document.getElementById('cert-materia').innerText = materiasFormatadas[materiaRaw] || materiaRaw;
    document.getElementById('cert-media').innerText = media;
    
    const campoNome = document.getElementById('cert-nome-aluno'); 
    if (nomeURL && nomeURL !== "Carregando...") { 
        campoNome.innerText = decodeURIComponent(nomeURL); 
    } else { 
        campoNome.innerText = "Estudante WXR"; 
    }

    const hoje = new Date();
    document.getElementById('cert-data').innerText = hoje.toLocaleDateString('pt-BR');

    // APLICANDO TEMA NOS DOIS LADOS
    const frente = document.getElementById('printable');
    const verso = document.getElementById('verso-layout');
    if(frente) frente.classList.add('tema-' + materiaRaw);
    if(verso) verso.classList.add('tema-' + materiaRaw);

    // --- LÓGICA DO VERSO (PROCESSANDO O SEU SQL) ---

    function textoParaSegundos(texto) {
        if (!texto) return 0;
        const numeros = texto.match(/\d+/g);
        if (!numeros) return 0;
        return numeros.length === 2 ? (parseInt(numeros[0]) * 60) + parseInt(numeros[1]) : parseInt(numeros[0]);
    }

    window.renderizarDadosVerso = function(dadosVindosDoSQL) {
        let totalSegundos = 0;
        let totalProvas = 0;
        let totalSimulados = 0;
        
        let tabelaHtml = `
            <table style="width:100%; border-collapse: collapse; font-family: 'Libre Baskerville'; font-size: 14px;">
                <thead>
                    <tr style="background: #f4f4f4; border-bottom: 2px solid #333;">
                        <th style="padding: 10px; text-align: left;">Capítulo</th>
                        <th style="padding: 10px; text-align: center;">Melhor Nota</th>
                        <th style="padding: 10px; text-align: center;">Status</th>
                    </tr>
                </thead>
                <tbody>`;

        dadosVindosDoSQL.forEach(item => {
            totalProvas += parseInt(item.total_provas || 0);
            totalSimulados += parseInt(item.total_simulados || 0);

            if (item.tempos_brutos) {
                const tempos = item.tempos_brutos.split('|');
                tempos.forEach(t => totalSegundos += textoParaSegundos(t));
            }

            tabelaHtml += `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 8px;">${item.capitulo}</td>
                    <td style="padding: 8px; text-align: center;">${item.melhor_nota}%</td>
                    <td style="padding: 8px; text-align: center; color: green; font-weight: bold;">PASS</td>
                </tr>`;
        });

        tabelaHtml += `</tbody></table>`;
        document.getElementById('tabela-dinamica').innerHTML = tabelaHtml;

        const horasDecimais = (totalSegundos / 3600).toFixed(1);
        document.getElementById('texto-logbook').innerHTML = `
            <div style="border-top: 2px solid #ddd; padding-top: 10px;">
                <strong>OFFICIAL TRAINING LOGBOOK:</strong> O técnico realizou um total de <b>${totalProvas} Provas Oficiais</b> 
                e <b>${totalSimulados} Simulados</b> de performance, totalizando 
                <u>${horasDecimais} horas</u> de instrução técnica ativa e análise de sistemas.
            </div>
        `;
    }

    async function carregarDadosReais() {
const idParaTeste = userId || '0e2a2bb3-c8f5-4ae0-bacc-95de8062b6c9';
        if (!userId) return;

        const { data: profile } = await supabase
            .from('profiles')
            .select('username')
            .eq('id', userId)
            .single();

        if (profile) {
            document.getElementById('cert-nome-aluno').innerText = profile.username;
        }

        const { data: historico, error } = await supabase
            .from('historico_simulados')
            .select('capitulo, nota, tipo, tempo')
            .eq('user_id', userId)
            .eq('materia', materiaRaw);

        if (historico && historico.length > 0) {
            const dadosAgrupados = processarHistorico(historico);
            window.renderizarDadosVerso(dadosAgrupados); 
        }
    }

    function processarHistorico(lista) {
        const caps = {};
        lista.forEach(item => {
            if (!caps[item.capitulo]) {
                caps[item.capitulo] = { 
                    capitulo: item.capitulo, 
                    melhor_nota: 0, 
                    total_provas: 0, 
                    total_simulados: 0, 
                    tempos_brutos: [] 
                };
            }
            
            if (item.nota > caps[item.capitulo].melhor_nota) caps[item.capitulo].melhor_nota = item.nota;
            if (item.tipo === 'Prova') caps[item.capitulo].total_provas++;
            if (item.tipo === 'Simulado') caps[item.capitulo].total_simulados++;
            caps[item.capitulo].tempos_brutos.push(item.tempo);
        });

        return Object.values(caps).map(c => ({
            ...c,
            tempos_brutos: c.tempos_brutos.join('|')
        }));
    }

    carregarDadosReais();

</script>

</body>
</html>
