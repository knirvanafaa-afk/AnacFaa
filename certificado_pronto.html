<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado - WXR</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        /* MANTENDO TODO O SEU ESTILO ORIGINAL */
        body { background-color: #f4f4f4; margin: 0; padding: 0; }
        
        .certificado-container {
            width: 1000px;
            height: 700px;
            background-color: #fff;
            padding: 20px;
            margin: 20px auto;
            border: 1px solid #ccc;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .moldura-tripla {
            width: 100%;
            height: 100%;
            border: 2px solid #002366;
            padding: 4px;
            box-sizing: border-box;
            position: relative;
        }

        .moldura-meio {
            width: 100%;
            height: 100%;
            border: 8px solid #002366;
            padding: 4px;
            box-sizing: border-box;
        }

        .moldura-interna {
            width: 100%;
            height: 100%;
            border: 2px solid #002366;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 60px;
            box-sizing: border-box;
            position: relative;
        }

        .selo-imagem {
            position: absolute;
            top: 8px;
            left: 20px;
            width: 110px;
            height: auto;
            z-index: 10;
        }

        .moldura-interna::before {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            border-top: 15px solid #002366;
            border-right: 15px solid #002366;
        }

        .moldura-interna::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 100px; height: 100px;
            border-bottom: 15px solid #002366;
            border-left: 15px solid #002366;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            letter-spacing: 8px;
            color: #002366;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitulo {
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            margin-top: 20px;
            color: #333;
        }

        .nome-aluno {
            font-family: 'Pinyon Script', cursive;
            font-size: 65px;
            color: #000;
            margin: 10px 0 5px 0;
        }

        .linha-azul {
            width: 80%;
            height: 2px;
            background-color: #002366;
            margin-bottom: 30px;
        }

        .texto-conclusao {
            font-family: 'Libre Baskerville', serif;
            font-size: 18px;
            text-align: center;
            max-width: 800px;
            line-height: 1.6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .materia-destaque {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 22px;
            display: block;
            width: 100%;
            text-align: right;
            margin-top: 20px;
            color: #002366;
        }

        .footer-dados {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            font-family: 'Libre Baskerville', serif;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        /* Botão para o aluno imprimir/salvar em PDF */
        .btn-imprimir {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #002366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
        }

        @media print {
            .btn-imprimir { display: none; }
            body { background: white; }
            .certificado-container { margin: 0; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="certificado-container" id="printable">
    <div class="moldura-tripla">
        <div class="moldura-meio">
            <div class="moldura-interna">
                <img src="selo.jpg" class="selo-imagem" id="selo-dinamico"> 

                <div style="height: 60px;"></div>
                
                <h1>Certificado de Estudos</h1>
                <p class="subtitulo">Certificamos que</p>
                
                <div class="nome-aluno" id="cert-nome-aluno">Carregando...</div>
                
                <div class="linha-azul"></div>
                
                <div class="texto-conclusao">
                    demonstrou com sucesso proficiência profissional ao concluir todos os exames e simulações práticas exigidas para o módulo de:
                    
                    <span class="materia-destaque" id="cert-materia">FAA Aviation Mechanic</span>
                </div>

                <div class="footer-dados">
                    <div><strong>EMITIDO EM:</strong> <span id="cert-data">--/--/----</span></div>
                    <div><strong>MÉDIA FINAL:</strong> <span id="cert-media">--</span>%</div>
                </div>
            </div>
        </div>
    </div>
</div>

<button class="btn-imprimir" onclick="window.print()">Salvar como PDF / Imprimir</button>

<script type="module">
    // 1. Pega os parâmetros da URL (materia e media)
    const urlParams = new URLSearchParams(window.location.search);
    const materiaRaw = urlParams.get('materia') || 'General';
    const media = urlParams.get('media') || '0';
const nomeURL = urlParams.get('nome');

    // 2. Formata o nome da matéria para o destaque
    const materiasFormatadas = {
        'General': 'FAA Aviation Mechanic — GENERAL',
        'Airframe': 'FAA Aviation Mechanic — AIRFRAME',
        'Powerplant': 'FAA Aviation Mechanic — POWERPLANT'
    };
        document.getElementById('cert-materia').innerText = materiasFormatadas[materiaRaw] || materiaRaw;
    document.getElementById('cert-media').innerText = media;
    
// 3. Define o Nome do Aluno 

const campoNome = document.getElementById('cert-nome-aluno'); 
if (nomeURL && nomeURL !== "Carregando...") { 

campoNome.innerText = decodeURIComponent(nomeURL); 
} else { 
campoNome.innerText = "Estudante WXR"; 
}

    // 4. Define a data atual
    const hoje = new Date();
    document.getElementById('cert-data').innerText = hoje.toLocaleDateString('pt-BR');

    // 4. Busca o nome do aluno via Supabase (opcional, ou pode passar via URL também)
    // Se você já tiver o nome no Dashboard, é melhor passar via URL. 
    // Mas aqui vou buscar do Auth do Supabase para garantir:
    import { createClient } from 'https://jspm.dev/@supabase/supabase-js';
    
    // Configure seu Supabase aqui ou pegue do seu arquivo de config
    const supabase = createClient('SUA_URL', 'SUA_KEY');

    async function carregarNome() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user && user.user_metadata && user.user_metadata.full_name) {
            document.getElementById('cert-nome-aluno').innerText = user.user_metadata.full_name;
        } else {
            document.getElementById('cert-nome-aluno').innerText = "Estudante WXR";
        }
    }
    carregarNome();
</script>

</body>
</html>
