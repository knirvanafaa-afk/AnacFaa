<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --verde-sucesso: #2ecc71; --verde-escuro: #1b5e20; --verde-claro-fundo: #fafffa; --cinza-fundo: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--cinza-fundo); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .logo-texto { font-family: 'Orbitron', sans-serif; font-size: 28px; color: var(--verde-escuro); margin-bottom: 20px; letter-spacing: 2px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .section-interna { border: 2px solid var(--verde-sucesso); padding: 25px; border-radius: 15px; background-color: var(--verde-claro-fundo); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; text-transform: uppercase; font-size: 18px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; font-size: 13px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; background: white; }
        input:focus { border-color: var(--verde-sucesso); box-shadow: 0 0 8px rgba(46, 204, 113, 0.3); }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; transition: 0.2s; }
        .btn-principal { background-color: var(--verde-escuro); color: white; }
        .link-alternativo { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .link-alternativo span { color: var(--verde-escuro); font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="custom-alert" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #fff9c4; border: 3px solid #f1c40f; padding: 25px; border-radius: 20px; max-width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <p id="alert-message" style="color: #333; font-weight: bold; font-size: 18px; margin-bottom: 20px;"></p>
        <button onclick="fecharAlerta()" style="background: #27ae60; color: white; border: none; padding: 10px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase;">OK</button>
    </div>
</div>

<div class="logo-texto">SKYLicense ACADEMY</div>
<div class="container">
    <h2>Acesso ao Hangar</h2>
    <div class="section-interna">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••">
       <button class="btn-principal" onclick="realizarLogin()">Entrar no Sistema</button>
    </div>
    <div class="link-alternativo">Novinho na área? <span onclick="window.location.href='planos.html'"> Criar Conta de Trainee</span></div>

<div class="link-alternativo" style="margin-top: 10px;">Esqueceu sua Senha? <span onclick="recuperarSenha()">Recuperar Senha</span>
</div>

<div class="link-alternativo">Perdeu acesso ao Authenticator?<span onclick="window.location.href='suporte-mfa.html'"> Solicitar Reset de MFA</span></div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

    window.fecharAlerta = () => document.getElementById('custom-alert').style.display = 'none';
    
    window.mostrarMensagem = (msg) => {
        document.getElementById('alert-message').innerText = msg;
        document.getElementById('custom-alert').style.display = 'flex';
    };

    window.realizarLogin = async () => {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-senha').value;

    if (!email || !password) {
        mostrarMensagem("Preencha e-mail e senha.");
        return;
    }

    try { // O 'try' precisa começar aqui!
        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
        });

        if (error) {

    // 🔥 NOVO: verifica se é e-mail não confirmado
    if (error.message && error.message.toLowerCase().includes("email not confirmed")) {
        mostrarMensagem("E-mail pendente de confirmação. Clique no link enviado no seu e-mail para liberar o acesso.");
        return;
    }

    const { data: checkEmail } = await supabase
        .from('profiles')
        .select('id')
        .eq('email', email)
        .maybeSingle();

    if (!checkEmail) {
        mostrarMensagem("E-mail não cadastrado.");
    } else {
        mostrarMensagem("Senha inválida.");
    }
    return;
}


// Busca o status real no banco

if (data.user) {
    const { data: profile } = await supabase
        .from('profiles')
        .select('status_acesso, expira_em')
        .eq('id', data.user.id)
        .single();

    const vencido = !profile.expira_em || new Date(profile.expira_em) < new Date();
    const isAdmin = profile.status_acesso === 'admin';
    const isPendente = profile.status_acesso === 'pendente';

    // 1. Regra de Ouro: Se for Admin, ignora todas as verificações de bloqueio abaixo

    if (!isAdmin) {
        
        // 2. Se for pendente OU se estiver vencido (seja beta ou qualquer outro status não-admin)

    if (isPendente && !profile.expira_em) {
        mostrarMensagem("Por favor efetue o pagamento para ter acesso ao nosso conteúdo!!!");
        return; // Bloqueia o acesso
    }

        if (isPendente || vencido) {
            mostrarMensagem("Sua assinatura está vencida. Por favor renove seu Plano! Redirecionando...");

            setTimeout(() => { window.location.href = 'planos.html'; }, 5000);

            return; // Bloqueia o acesso
        }
    }
    
    // Se chegou aqui, ou é Admin, ou é um usuário ativo dentro do prazo.
}

// ===== FIM DAS NOVAS REGRAS =====

        // Se o login passou, verifica MFA
        const { data: factors } = await supabase.auth.mfa.listFactors();

        if (factors && factors.totp && factors.totp.length > 0) {
            window.location.href = 'verificar-mfa.html';
        } else {
            window.location.href = 'ativar-acesso.html';
        }

    } catch (e) {
        mostrarMensagem("Erro de Acesso: " + e.message);
    }
};

window.recuperarSenha = async () => {
    // Usamos o prompt para capturar o e-mail de forma rápida
    const email = prompt("Digite seu e-mail cadastrado para receber o link de recuperação:");
    
    if (!email) return;

    // Regra simples de validação de e-mail antes de enviar
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        return mostrarMensagem("Por favor, digite um e-mail válido.");
    }

    // Função nativa do Supabase para enviar o link de reset
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://knirvanafaa-afk.github.io/AnacFaa/verificar-mfa.html?reset=true'
    });

    if (error) {
        mostrarMensagem("Erro ao enviar: " + error.message);
    } else {
        mostrarMensagem("E-mail de recuperação enviado! Verifique sua caixa de entrada e o spam.");
    }
};

</script>
</body>
</html>
