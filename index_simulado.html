<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Exam</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Alinhado ao topo */
            min-height: 100vh; 
            margin: 0; 
            padding-top: 50px; /* Respiro do topo */
            user-select: none; 
        }

        .main-wrapper { width: 90%; max-width: 600px; }
        
        .yellow-header {
            background-color: #fff9c4;
            border: 2px solid #f1c40f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
        }

        h2 { color: #2c3e50; margin: 0; font-size: 1.1rem; }

        .white-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #27ae60; /* Verde padrão do seu site */
            box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        .btn-subject { 
            padding: 15px 5px; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .btn-subject:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-general { background-color: #3498db; }
        .btn-airframe { background-color: #e74c3c; }
        .btn-powerplant { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="yellow-header">
        <h2>Choose an option to start your test</h2>
    </div>

    <div class="white-box">
        <div class="btn-grid">
    <button id="btn-general" class="btn-subject btn-general">GENERAL</button>
    <button id="btn-airframe" class="btn-subject btn-airframe">AIRFRAME</button>
    <button id="btn-powerplant" class="btn-subject btn-powerplant">POWERPLANT</button>
</div>
    </div>
</div>

<script type="module">
    import { validarAcessoTotal } from './seguranca.js';

    // 1. Validação de segurança primeiro
    await validarAcessoTotal(false);

    // 2. Função de navegação
    const iniciarSimulado = (materia) => {
        sessionStorage.clear();
        sessionStorage.setItem('selectedSubject', materia);
        sessionStorage.setItem('questionCount', 60);
        window.location.href = 'simulado.html';
    };

    // 3. Garante que os botões funcionem após a página carregar
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btn-general').addEventListener('click', () => iniciarSimulado('General'));
        document.getElementById('btn-airframe').addEventListener('click', () => iniciarSimulado('Airframe'));
        document.getElementById('btn-powerplant').addEventListener('click', () => iniciarSimulado('Powerplant'));
    });
</script>
</body>
</html>
