<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Exam</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Alinhado ao topo */
            min-height: 100vh; 
            margin: 0; 
            padding-top: 50px; /* Respiro do topo */
            user-select: none; 
        }

        .main-wrapper { width: 90%; max-width: 600px; }
        
        .yellow-header {
            background-color: #fff9c4;
            border: 2px solid #f1c40f;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
        }

        h2 { color: #2c3e50; margin: 0; font-size: 1.1rem; }

        .white-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #27ae60; /* Verde padrão do seu site */
            box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        .btn-subject { 
            padding: 15px 5px; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .btn-subject:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-general { background-color: #3498db; }
        .btn-airframe { background-color: #e74c3c; }
        .btn-powerplant { background-color: #27ae60; }

.btn-voltar {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center; /* Centraliza o texto */
    gap: 10px;
    box-shadow: 0px 4px 0px #1e8449;
    transition: 0.1s;
    margin-top: 15px; /* Espaço após o botão de cima */
    margin-bottom: 10px;
    text-decoration: none;
    width: 100%; /* Para ocupar a largura do card verde */
    box-sizing: border-box;
}

.btn-voltar:active {
    transform: translateY(3px);
    box-shadow: 0px 1px 0px #1e8449;
}

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="yellow-header">
        <h2>Choose an option to start your test</h2>
    </div>

    <div class="white-box">
       <div class="btn-grid"> <button class="btn-subject btn-general" onclick="iniciarSimulado('General')">GENERAL</button> <button class="btn-subject btn-airframe" onclick="iniciarSimulado('Airframe')">AIRFRAME</button> <button class="btn-subject btn-powerplant" onclick="iniciarSimulado('Powerplant')">POWERPLANT</button> 

<button class="btn-voltar" onclick="window.location.href='dashboard.html'" style="grid-column: 1 / -1; margin-top: 20px;">⬅ Voltar</button>

</div>
    </div>
</div>

<script>
    // 1. Criamos um "monitor" de erros que exibe na tela se algo falhar
    window.onerror = function(message, source, lineno, colno, error) {
        alert("Erro no Script: " + message + " na linha " + lineno);
    };

    // 2. Carrega a segurança (usando o caminho correto)
    import('./seguranca.js').then(module => {
        module.validarAcessoTotal(false);
    }).catch(err => {
        alert("Erro ao carregar Segurança.js: " + err);
    });

    // 3. Função que o botão chama
    window.iniciarSimulado = function(materia) {
        // Log para saber se a função foi chamada

sessionStorage.setItem('modo_execucao', 'Simulado');   

        console.log("Botão clicado para: " + materia);    
 sessionStorage.setItem('selectedSubject', materia);
        sessionStorage.setItem('questionCount', 60);
        
        // Redireciona
        window.location.href = 'simulado.html';
    };
</script>
</body>
</html>
