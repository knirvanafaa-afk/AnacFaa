<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Exam</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 600px; }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-subject { padding: 20px 10px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-subject:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .btn-general { background-color: #3498db; }
        .btn-airframe { background-color: #e74c3c; }
        .btn-powerplant { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>Choose an option to start your test</h2>
    <div class="btn-grid">
        <button class="btn-subject btn-general" onclick="startTest('GENERAL', 60)">GENERAL</button>
        <button class="btn-subject btn-airframe" onclick="startTest('AIRFRAME', 100)">AIRFRAME</button>
        <button class="btn-subject btn-powerplant" onclick="startTest('POWERPLANT', 100)">POWERPLANT</button>
    </div>
</div>

<script type="module">
    import { validarAcessoTotal } from './Segurança.js';
    
    // Proteção de entrada
    await validarAcessoTotal(false);

    window.startTest = (subject, qCount) => {
        sessionStorage.setItem('selectedSubject', subject);
        sessionStorage.setItem('questionCount', qCount);
        window.location.href = 'simulado.html';
    };
</script>
</body>
</html>
