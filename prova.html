<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado em Andamento</title>
    <style>
        /* CSS INTEGRALMENTE PRESERVADO */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); }
        h2 { background-color: #27ae60; color: white; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; text-transform: uppercase; margin-top: 0; margin-bottom: 10px !important; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        .pergunta-card { border: 2px solid #3498db; padding: 20px; border-radius: 15px; background-color: #f4faff; margin-bottom: 20px; transition: 0.3s; }
        .texto-enunciado { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; display: block; }
        .opcao { display: flex; align-items: center; background: white; border: 1px solid #ccc; padding: 12px; margin-top: 8px; border-radius: 10px; cursor: pointer; }
        .opcao:hover { border-color: #3498db; }
        .opcao input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        .correta { border: 2px solid #2ecc71 !important; background-color: #eafff0 !important; }
        .errada { border: 2px solid #e74c3c !important; background-color: #fff0f0 !important; }
        .btn-finalizar { background-color: #27ae60; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; text-transform: uppercase; margin-top: 10px; }
        #resultado-caixa { display: none; background: #27ae60; color: white; padding: 25px; border-radius: 15px; margin-top: 30px; text-align: center; }
        .btn-voltar { background: #fff9c4; padding: 10px 20px; border: 2px solid #f1c40f; color: #000000; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        #timer-display { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #f1c40f; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fff9c4; color: #444; text-align: center; font-weight: bold; }
        .tempo-critico { color: #e74c3c !important; border-color: #e74c3c !important; animation: piscar 1s infinite; }
        @keyframes piscar { 50% { opacity: 0.6; } }
        .topo-fixo { position: sticky; top: 0; z-index: 1000; background-color: white; padding: 10px 0; border-radius: 15px; box-shadow: 0px 8px 10px -10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="custom-alert" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #fff9c4; border: 3px solid #f1c40f; padding: 25px; border-radius: 20px; max-width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <p id="alert-message" style="color: #333; font-weight: bold; font-size: 18px; margin-bottom: 20px;"></p>
        <button onclick="fecharAlerta()" style="background: #27ae60; color: white; border: none; padding: 10px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase;">OK</button>
    </div>
</div>

<div class="container">
    <div class="topo-fixo">
        <h2 id="titulo-prova">Carregando...</h2>
        <div id="timer-display">TEMPO: <span id="contagem">--:--</span> MIN</div>
    </div>
    <div id="questoes-container"></div>
    <button class="btn-finalizar" id="btn-concluir" onclick="finalizarProva()">Finalizar Prova</button>
    
    <div id="resultado-caixa">
        <h3>RESULTADO FINAL</h3>
        <p id="res-acertos"></p>
        <p id="res-porcentagem"></p>
        <p id="res-tempo"></p>
        <button class="btn-voltar" onclick="window.location.href='alunos.html'">Fazer Novo Simulado</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { validarAcessoTotal } from './seguranca.js';

    validarAcessoTotal();

    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'); // Mantenha sua chave real aqui

    let perguntasSorteador = [];
    let intervaloTimer;
    let tempoInicio = Date.now();

    async function montarSimulado() {
        const materiaAlvo = sessionStorage.getItem('config_materia');
        const capituloAlvo = sessionStorage.getItem('config_capitulo');
        const qtdAlvo = parseInt(sessionStorage.getItem('config_qtd'));
        
        if(!materiaAlvo) { window.location.href = 'alunos.html'; return; }

        document.getElementById('titulo-prova').innerText = "Simulado: " + ((capituloAlvo && capituloAlvo !== "todos") ? capituloAlvo : materiaAlvo);

        let query = supabase.from('questoes').select('*').eq('materia', materiaAlvo);
        if (capituloAlvo && capituloAlvo !== "todos") query = query.eq('capitulo', capituloAlvo);

        const { data, error } = await query;
        if (error) { window.mostrarMensagem("Erro: " + error.message); return; }

        perguntasSorteador = data.sort(() => Math.random() - 0.5).slice(0, qtdAlvo);
        exibirQuestoes();
        iniciarTimer(qtdAlvo);
    }

    function iniciarTimer(qtd) {
        let minutos = (qtd <= 10) ? 15 : (qtd <= 20) ? 25 : (qtd <= 30) ? 35 : 60;
        const momentoTermino = Date.now() + (minutos * 60 * 1000);

        intervaloTimer = setInterval(() => {
            const restante = momentoTermino - Date.now();
            if (restante <= 0) {
                clearInterval(intervaloTimer);
                window.finalizarProva(true);
                return;
            }
            const m = Math.floor(restante / 60000);
            const s = Math.floor((restante % 60000) / 1000);
            document.getElementById('contagem').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function exibirQuestoes() {
        const container = document.getElementById('questoes-container');
        perguntasSorteador.forEach((q, i) => {
            container.innerHTML += `
                <div class="pergunta-card" id="card-${i}">
                    <span class="texto-enunciado">${i + 1}) ${q.pergunta}</span>
                    ${q.foto ? `<img src="${q.foto}" style="max-width:100%; border-radius:10px; margin-bottom:15px;">` : ''}
                    <label class="opcao"><input type="radio" name="p${i}" value="1"> ${q.r1}</label>
                    <label class="opcao"><input type="radio" name="p${i}" value="2"> ${q.r2}</label>
                    <label class="opcao"><input type="radio" name="p${i}" value="3"> ${q.r3}</label>
                    <label class="opcao" style="display: ${q.r4 === "N/A" ? 'none' : 'flex'}"><input type="radio" name="p${i}" value="4"> ${q.r4}</label>
                    <div id="feedback-${i}" style="display:none; margin-top:10px; font-weight:bold;"></div>
                </div>`;
        });
    }

    window.finalizarProva = function(foiPorTempo = false) {
        clearInterval(intervaloTimer);
        let acertos = 0;
        perguntasSorteador.forEach((q, i) => {
            const marcado = document.querySelector(`input[name="p${i}"]:checked`)?.value;
            const feedback = document.getElementById(`feedback-${i}`);
            feedback.style.display = "block";
            if(marcado == q.correta) { acertos++; document.getElementById(`card-${i}`).className += " correta"; feedback.innerText = "✅ Correto!"; }
            else { document.getElementById(`card-${i}`).className += " errada"; feedback.innerText = `❌ Incorreto. Correta: ${q.correta}`; }
        });
        
        document.querySelectorAll('input').forEach(r => r.disabled = true);
        document.getElementById('btn-concluir').style.display = "none";
        document.getElementById('resultado-caixa').style.display = "block";
        document.getElementById('res-acertos').innerText = `Acertos: ${acertos} / ${perguntasSorteador.length}`;
        
        registrarResultadoNoBanco(sessionStorage.getItem('config_materia'), sessionStorage.getItem('config_capitulo'), acertos, perguntasSorteador.length, "finalizado");
    };

    async function registrarResultadoNoBanco(materia, capitulo, acertos, total, tempo) {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;
        await supabase.from('historico_simulados').insert([{ user_id: user.id, materia, capitulo, acertos, total_questoes: total, nota: (acertos/total)*100 }]);
    }

    window.mostrarMensagem = (t) => { document.getElementById('alert-message').innerText = t; document.getElementById('custom-alert').style.display = 'flex'; };
    window.fecharAlerta = () => { document.getElementById('custom-alert').style.display = 'none'; };

    montarSimulado();
</script>
</body>
</html>
