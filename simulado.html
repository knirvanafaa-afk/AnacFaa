<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EXAM FAA - Modo Prova</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); }
        h2 { background-color: #27ae60; color: white; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        
        .header-box {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background-color: #fff9c4;
            border: 2px solid #f1c40f;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #444;
        }

        .tempo-critico {
            color: #e74c3c !important;
            border-color: #e74c3c !important;
            animation: piscar 1s infinite;
        }

        @keyframes piscar { 50% { opacity: 0.6; } }

        .pergunta-card { border: 2px solid #3498db; padding: 20px; border-radius: 15px; background-color: #f4faff; margin-bottom: 20px; }
        .texto-enunciado { font-weight: bold; font-size: 18px; margin-bottom: 20px; color: #2c3e50; }
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #3498db; color: white; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        #btn-flag { background: #f39c12; }
        #btn-flag.active { background: #e67e22; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #btn-finish { background: #e74c3c; }
        #result-screen { display: none; text-align: center; padding: 40px; }
        .status-box { padding: 30px; border-radius: 15px; font-size: 40px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .passed { background-color: #2ecc71; color: white; }
        .failed { background-color: #e74c3c; color: white; }
        #review-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin: 20px 0; }
        .review-item { padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; font-weight: bold; border: 1px solid #ccc; background: #ecf0f1; }
        .status-answered { background-color: #27ae60; color: white; border-color: #2ecc71; }
        .status-flagged { background-color: #f39c12; color: white; border-color: #e67e22; }
        .status-unanswered { background-color: #bdc3c7; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulado FAA</h2>
    
    <div id="exam-screen">
        <div id="header-box" class="header-box">
            <span id="q-counter">Carregando...</span>
            <div id="timer-wrapper">
                TEMPO: <span id="timer">02:00:00</span>
            </div>
        </div>

        <div class="pergunta-card">
            <div id="question-text" class="texto-enunciado">Carregando questões...</div>
            <div id="options-container"></div>
        </div>
        <div class="nav-bar">
            <button onclick="changeQuestion(-1)">BACK</button>
            <button id="btn-flag" onclick="toggleFlag()">🚩 FLAG</button>
            <button onclick="changeQuestion(1)">NEXT</button>
            <button id="btn-finish" onclick="finishExam()">FINISH</button>
        </div>
    </div>

    <div id="review-screen" style="display:none;">
        <h2>REVIEW EXAM</h2>
        <div id="review-grid"></div>
        <div class="nav-bar" style="grid-template-columns: 1fr 1fr;">
            <button onclick="hideReview()" style="background:#7f8c8d;">BACK</button>
            <button onclick="confirmFinish()" style="background:#e74c3c;">SUBMIT</button>
        </div>
    </div>

    <div id="result-screen">
        <div id="status-text" class="status-box"></div>
        <div style="font-size: 24px; margin-bottom: 20px;">
            SCORE: <span id="final-score">0/0</span><br>
            TIME: <span id="final-time">00:00</span>
        </div>
        <button style="width: 100%; background: #2c3e50; padding: 15px;" onclick="window.location.href='index_simulado.html'">NEW TEST</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { validarAcessoTotal } from './seguranca.js';

    const supabaseUrl = 'https://ymyxikhlhkkvcufgwufe.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA';
    const supabase = createClient(supabaseUrl, supabaseKey);

    // 1. Valida o acesso primeiro
    await validarAcessoTotal(false);

    // 2. Variáveis globais dentro do módulo
    const subject = sessionStorage.getItem('selectedSubject');
    const qCount = parseInt(sessionStorage.getItem('questionCount')) || 60;
    let currentIdx = 0;
    let answers = {};
    let flags = {};
    let questions = [];
    let timeLeft = 120 * 60; 
    let timerInterval;

    // 3. Função de busca
    async function fetchQuestions() {
    console.log("Buscando questões para:", subject);
    
    // O nome da sua tabela no banco deve ser "questoes"
    const { data, error } = await supabase
        .from('questoes') 
        .select('pergunta, r1, r2, r3, r4, correta, materia')
        .eq('materia', subject)
        .limit(60);

    if (error) {
        console.error("Erro Supabase:", error);
        alert("Erro no banco: " + error.message);
        return;
    }

    if (!data || data.length === 0) {
        alert("Nenhuma questão encontrada para " + subject);
        return;
    }

    questions = data;
    console.log("Sucesso! Questões carregadas:", questions.length);
    
    // Esconde o loading e inicia
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('exam-screen').style.display = 'block';
    
    loadQuestion();
    startTimer();
}
         else {
            document.getElementById('question-text').innerText = "Nenhuma questão encontrada.";
        }
    }

    // 4. Funções auxiliares movidas para o escopo global para o HTML achar
    window.loadQuestion = () => {
        const q = questions[currentIdx];
        document.getElementById('q-counter').innerText = `Q ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question-text').innerText = q.pergunta;
        
        let html = '';
        const opts = [q.r1, q.r2, q.r3, q.r4];
        opts.forEach((opt, i) => {
            if (opt && opt !== 'N/A') {
                let checked = (answers[currentIdx] === i) ? 'checked' : '';
                html += `<label style="display:block; padding:8px; cursor:pointer;">
                            <input type="radio" name="ans" value="${i}" ${checked} onchange="saveAnswer(${i})"> ${opt}
                         </label>`;
            }
        });
        document.getElementById('options-container').innerHTML = html;
    };

    window.saveAnswer = (i) => answers[currentIdx] = i;
    window.changeQuestion = (dir) => { if (questions[currentIdx + dir]) { currentIdx += dir; window.loadQuestion(); } };
    window.startTimer = () => {
        timerInterval = setInterval(() => {
            timeLeft--;
            const h = Math.floor(timeLeft / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(timeLeft <= 0) clearInterval(timerInterval);
        }, 1000);
    };

    // Inicia o processo
    fetchQuestions();
</script>
</body>
</html>
