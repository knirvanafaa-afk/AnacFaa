<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EXAM FAA - Modo Prova</title> 
<style>
    /* --- ESTRUTURA E LAYOUT (MELHORADO) --- */
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
    
   /* 1. Container ocupa toda a altura disponível */ .container { width: 100%; max-width: 950px; min-height: 85vh; background: white; padding: 40px; border-radius: 25px; box-shadow: 0px 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    
    h2 { background-color: #27ae60; color: white; text-align: center; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 50px; text-transform: uppercase; margin-bottom: 35px; }
    
    .header-box { display: flex; justify-content: space-between; align-items: center; background-color: #fff9c4; border: 2px solid #f1c40f; padding: 20px; border-radius: 12px; margin-bottom: 30px; font-weight: bold; color: #444; font-size: 40px; }

    /* --- FUNÇÃO TIMER (ORIGINAL MANTIDA) --- */
    .tempo-critico { color: #e74c3c !important; border-color: #e74c3c !important; animation: piscar 1s infinite; }
    @keyframes piscar { 50% { opacity: 0.6; } }

    /* --- PERGUNTAS E NAVEGAÇÃO (TAMANHOS AUMENTADOS) --- */

   .pergunta-card { 
border: 2px solid #3498db; 
padding: 30px; 
border-radius: 20px; 
background-color: #f4faff; margin-bottom: 20px; 
height: 1000px;
overflow-y: auto;  
display: flex; flex-direction: column; box-sizing: border-box;
} 

    .texto-enunciado { font-weight: 600; font-size: 35px; line-height: 1.5; color: #2c3e50; margin-bottom: 30px; }
    label { display: block; padding: 18px; border-bottom: none !important; cursor: pointer; font-size: 32px; color: #34495e; transition: 0.2s; }
    label:hover { background-color: #e3f2fd; }
    input[type="radio"] { margin-right: 15px; transform: scale(1.5); }
    .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: auto; }
    button { padding: 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; background: #3498db; color: white; transition: 0.2s; font-size: 30px; }
    button:hover { opacity: 0.9; }

    /* --- BOTÕES ESPECÍFICOS --- */
    #btn-flag { background: #f39c12; }
    #btn-flag.active { background: #e67e22; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    #btn-finish { background: #e74c3c; }

    /* --- RESULTADOS E REVISÃO (ORIGINAIS MANTIDOS) --- */
    #result-screen { display: none; text-align: center; padding: 40px; }
    .status-box { padding: 30px; border-radius: 15px; font-size: 50px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
    .passed { background-color: #2ecc71; color: white; }
    .failed { background-color: #e74c3c; color: white; }
    #review-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; margin: 30px 0; }
    .review-item { padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; border: 1px solid #ccc; background: #ecf0f1; font-size: 22px; }
    .status-answered { background-color: #27ae60; color: white; border-color: #2ecc71; }
    .status-flagged { background-color: #f39c12; color: white; border-color: #e67e22; }
    .status-unanswered { background-color: #bdc3c7; color: white; }
</style>
</head>
<body>

<div id="custom-alert" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #fff9c4; border: 3px solid #f1c40f; padding: 40px; border-radius: 25px; width: 60%; height: 25%; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <p id="alert-message" style="color: #333; font-weight: bold; font-size: 50px; margin-bottom: 30px;"></p>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="btn-no" onclick="fecharAlerta()" style="background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 35px;">NO</button>
            <button id="btn-yes" onclick="executarFinalizacao()" style="background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 35px;">YES</button>
        </div>
    </div>
</div>

<div class="container">
    <h2>Simulado FAA</h2>
    
    <div id="exam-screen">
        <div id="header-box" class="header-box">
            <span id="q-counter">Carregando...</span>
            <div id="timer-wrapper">
                TEMPO: <span id="timer">02:00:00</span>
            </div>
        </div>

        <div class="pergunta-card">
            <div id="question-text" class="texto-enunciado">Carregando questões...</div>
            <div id="options-container"></div>
        </div>
        <div class="nav-bar">
            <button onclick="changeQuestion(-1)">BACK</button>
            <button id="btn-flag" onclick="toggleFlag()">🚩 FLAG</button>
            <button onclick="changeQuestion(1)">NEXT</button>
            <button id="btn-finish" onclick="finishExam()">FINISH</button>
        </div>
    </div>

    <div id="review-screen" style="display:none;">
        <h2>REVIEW EXAM</h2>
        <div id="review-grid"></div>
        <div class="nav-bar" style="grid-template-columns: 1fr 1fr;">
            <button onclick="hideReview()" style="background:#7f8c8d;">BACK</button>
            <button onclick="confirmFinish()" style="background:#e74c3c;">SUBMIT</button>
        </div>
    </div>

    <div id="result-screen">
        <div id="status-text" class="status-box"></div>
        <div style="font-size: 35px; margin-bottom: 20px;">
            SCORE: <span id="final-score">0/0</span><br>
            TIME: <span id="final-time">00:00</span>
        </div>
        <button style="width: 100%; background: #2c3e50; padding: 15px;" onclick="window.location.href='index_simulado.html'">NEW TEST</button>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import { validarAcessoTotal } from './seguranca.js';

    const supabaseUrl = 'https://ymyxikhlhkkvcufgwufe.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA';
    const supabase = createClient(supabaseUrl, supabaseKey);

    await validarAcessoTotal(false);

    const subject = sessionStorage.getItem('selectedSubject');
    let currentIdx = 0;
    let answers = {}; 
    let flags = {}; // Variável para armazenar as bandeiras
    let questions = [];
    let timeLeft = 120 * 60; 
    let timerInterval;

    async function fetchQuestions() {
        const { data, error } = await supabase
            .from('questoes')
            .select('pergunta, r1, r2, r3, r4, correta, foto, num')
            .eq('materia', subject);

        if (error) { console.error(error); return; }
        questions = data.sort(() => 0.5 - Math.random()).slice(0, 60);
        loadQuestion();
        startTimer();
    }

    // --- LÓGICA DE FLAGS (RECUPERADA) ---
    window.toggleFlag = () => { 
        flags[currentIdx] = !flags[currentIdx]; 
        updateFlagButton(); 
    };

    function updateFlagButton() {
        const btn = document.getElementById('btn-flag');
        btn.className = flags[currentIdx] ? 'active' : '';
        btn.innerText = flags[currentIdx] ? "🚩 FLAGGED" : "🚩 FLAG";
    }

    // --- REVISÃO (RECUPERADA) ---
    function showReview() {
        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('review-screen').style.display = 'block';
        const grid = document.getElementById('review-grid');
        grid.innerHTML = '';
        questions.forEach((q, i) => {
            const item = document.createElement('div');
            item.className = 'review-item ' + (flags[i] ? 'status-flagged' : (answers[i] !== undefined ? 'status-answered' : 'status-unanswered'));
            item.innerText = i + 1;
            item.onclick = () => { currentIdx = i; document.getElementById('review-screen').style.display = 'none'; document.getElementById('exam-screen').style.display = 'block'; loadQuestion(); };
            grid.appendChild(item);
        });
    }

    // --- FINALIZAÇÃO E SALVAMENTO ---
    window.processFinalResult = async () => {
        clearInterval(timerInterval);
        
        let score = 0;
        const logQuestoes = questions.map((q, i) => {
            const acertou = (answers[i] === (parseInt(q.correta) - 1));
            if (acertou) score++;
            return { id: q.num, acertou: acertou };
        });

        // Salva no banco passando o array de questões
        await registrarResultadoNoBanco(subject, logQuestoes);

        document.getElementById('exam-screen').style.display = 'none';
        document.getElementById('review-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const passed = (score / questions.length) >= 0.7;
        document.getElementById('status-text').innerText = passed ? "PASSED" : "FAILED";
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
    };

    async function registrarResultadoNoBanco(materia, questoesRespondidas) {
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const logs = questoesRespondidas.map(q => ({
                user_id: user.id,
                materia: materia,
                id_questao: q.id,
                acertos: q.acertou ? 1 : 0,
                erros: q.acertou ? 0 : 1,
                total_questoes: 1,
                nota: q.acertou ? 100 : 0
            }));
            await supabase.from('historico_simulados').insert(logs);
        } catch (err) { console.error("Erro ao salvar:", err); }
    }

    // --- NAVEGAÇÃO ---
    window.loadQuestion = () => {
        const q = questions[currentIdx];
        document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question-text').innerText = q.pergunta;
        updateFlagButton(); // Garante que o estado da bandeira seja atualizado
        // ... (resto da lógica de carregar opções igual a anterior) ...
    };

    fetchQuestions();

</script>
</body>
</html>
