<div id="painel" style="background:#000; color:#0ff; padding:20px; font-family:monospace; font-size:18px;">
    <h3>SLA - LABORATÓRIO DE CONEXÃO</h3>
    <div id="passo1">1. Testando IP e Localização...</div>
    <div id="passo2">2. Testando Gravação no Supabase...</div>
    <hr>
    <div id="resultado" style="color:#f1c40f">Aguardando...</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://ymyxikhlhkkvcufgwufe.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

async function obterLocalizacaoREAL() {
    try {
        const geoRes = await fetch('https://ipwho.is/');
        const geoData = await geoRes.json();

        if (!geoData.success) {
            throw new Error("Geo falhou");
        }

        return {
            ip: geoData.ip,
            cidade: geoData.city,
            regiao: geoData.region,
            pais: geoData.country
        };

    } catch (e) {
        throw new Error("Falha TOTAL: " + e.message);
    }
}

async function rodarTeste() {
    const resDiv = document.getElementById('resultado');

    let dados;

    // PASSO 1
    try {
        dados = await obterLocalizacaoREAL();

        document.getElementById('passo1').innerHTML =
            "✅ IP REAL: " + dados.ip + " | " + dados.cidade;

    } catch (e) {
        document.getElementById('passo1').innerHTML =
            "❌ ERRO: " + e.message;

        resDiv.innerHTML = "❌ TESTE CANCELADO";
        resDiv.style.color = "red";
        return;
    }

    // PASSO 2
    try {
        document.getElementById('passo2').innerHTML = "⏳ Gravando no banco...";

        const { error } = await supabase
        .from('access_logs')
        .insert([{
            user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8',
            ip_address: dados.ip,
            city: dados.cidade,
            region: dados.regiao,
            country: dados.pais
        }]);

        if (error) throw error;

        resDiv.innerHTML = "🚀 SUCESSO REAL";
        resDiv.style.color = "#2ecc71";

    } catch (err) {
        resDiv.innerHTML = "❌ ERRO BANCO: " + err.message;
        resDiv.style.color = "red";
    }
}

rodarTeste();
</script>
