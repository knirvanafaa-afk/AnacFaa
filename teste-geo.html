<div id="painel" style="background:#000; color:#0ff; padding:20px; font-family:monospace; font-size:18px;">
    <h3>SLA - LABORATÓRIO DE CONEXÃO</h3>
    <div id="passo1">1. Testando IP e Localização...</div>
    <div id="passo2">2. Testando Gravação no Supabase...</div>
    <hr>
    <div id="resultado" style="color:#f1c40f">Aguardando...</div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

    async function rodarTeste() {
        const resDiv = document.getElementById('resultado');
        
        // Dados padrão caso tudo falhe
        let dadosParaBanco = {
            ip: '0.0.0.0',
            cidade: 'Erro CORS',
            regiao: 'N/A'
        };

        // --- PASSO 1: TENTAR OBTER LOCALIZAÇÃO ---
        try {
            // Usando a demo da ip-api que permite acesso do GitHub Pages
            const geoRes = await fetch('https://demo.ip-api.com/json/?lang=pt-BR'); 
            const geoData = await geoRes.json();
            
            if(geoData && geoData.status !== 'fail') {
                document.getElementById('passo1').innerHTML = "✅ CONEXÃO OK: " + geoData.query;
                dadosParaBanco.ip = geoData.query;
                dadosParaBanco.cidade = geoData.city;
                dadosParaBanco.regiao = geoData.regionName;
            } else {
                throw new Error("Resposta inválida da API");
            }
        } catch (e) {
            document.getElementById('passo1').innerHTML = "⚠️ ERRO DE CORS/REQUISIÇÃO: " + e.message;
        }

        // --- PASSO 2: TESTAR SUPABASE ---
        try {
            document.getElementById('passo2').innerHTML = "⏳ Enviando para o Banco...";
            
            const { error } = await supabase.from('access_logs').insert([{
                user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8', 
                ip_address: dadosParaBanco.ip,
                city: dadosParaBanco.cidade,
                region: dadosParaBanco.regiao,
                country: 'Brasil'
            }]);

            if (error) {
                resDiv.innerHTML = `❌ ERRO NO BANCO (FAULT CODE): ${error.code} - ${error.message}`;
                resDiv.style.color = "#ff4d4d";
            } else {
                resDiv.innerHTML = "🚀 SUCESSO TOTAL! Localização gravada na tabela.";
                resDiv.style.color = "#2ecc71";
            }

        } catch (err) {
            resDiv.innerHTML = `⚠️ FALHA TÉCNICA NO SCRIPT: ${err.message}`;
            resDiv.style.color = "#ff4d4d";
        }
    }
    rodarTeste();
</script>
