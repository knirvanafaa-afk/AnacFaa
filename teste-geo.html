<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Prova Real Nativa + Supabase</title>
</head>
<body style="background:#000; color:#0ff; font-family:monospace; padding:20px;">

<h3>SLA - LABORATÓRIO DE CONEXÃO (NATIVO)</h3>
<div id="passo1">1. Capturando Localização via GPS/Rede...</div>
<div id="passo2">2. Gravando no Supabase...</div>
<hr>
<div id="resultado" style="color:#f1c40f">Aguardando...</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

async function iniciarTeste() {
    const resDiv = document.getElementById('resultado');
    const p1 = document.getElementById('passo1');
    const p2 = document.getElementById('passo2');

    // 1. PEGAR IP VIA CLOUDFLARE (O QUE VOCÊ PROVOU QUE FUNCIONA)
    let ipReal = "0.0.0.0";
    try {
        const cf = await fetch('https://1.1.1.1/cdn-cgi/trace');
        const text = await cf.text();
        ipReal = text.split('\n').find(row => row.startsWith('ip=')).split('=')[1];
    } catch(e) { console.error("Erro IP"); }

    // 2. PEGAR CIDADE VIA NAVEGADOR (SEM DEPENDER DE API DE GEO)
    if ("geolocation" in navigator) {
        p1.innerHTML = "⏳ Solicitando permissão de localização no celular...";
        
        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            p1.innerHTML = `✅ COORDENADAS: ${lat}, ${lon}`;

            try {
                p2.innerHTML = "⏳ Gravando no Supabase...";
                // Gravamos a latitude e longitude como "cidade/região" para provar a precisão
                const { error } = await supabase.from('access_logs').insert([{
                    user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8',
                    ip_address: ipReal,
                    city: `Lat: ${lat.toFixed(2)}`,
                    region: `Lon: ${lon.toFixed(2)}`,
                    country: 'BR'
                }]);

                if (error) throw error;
                resDiv.innerHTML = "🚀 SUCESSO TOTAL! Localização real gravada via GPS.";
                resDiv.style.color = "#2ecc71";
            } catch (err) {
                resDiv.innerHTML = "❌ ERRO BANCO: " + err.message;
            }
        }, (error) => {
            resDiv.innerHTML = "❌ GPS NEGADO OU FALHOU: " + error.message;
        });
    } else {
        resDiv.innerHTML = "❌ Seu navegador não suporta GeoLocalização.";
    }
}

iniciarTeste();
</script>
</body>
</html>
