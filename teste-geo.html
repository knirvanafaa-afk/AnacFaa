<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Diagnóstico Geo + Supabase</title>
</head>

<body style="background:#000; color:#0ff; font-family:monospace; padding:20px;">

<h3>SLA - LABORATÓRIO DE CONEXÃO</h3>

<div id="passo1">1. Testando IP e Localização...</div>
<div id="passo2">2. Testando Gravação no Supabase...</div>

<hr>

<div id="resultado" style="color:#f1c40f">Aguardando...</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');


// 🔥 FUNÇÃO ROBUSTA (SEM QUEBRAR)
async function obterLocalizacaoREAL() {

    // Lista de APIs (ordem de tentativa)
    const fontes = [
        async () => {
            const r = await fetch('https://ipwho.is/');
            const d = await r.json();
            if (!d.success) throw new Error("ipwho falhou");
            return {
                ip: d.ip,
                cidade: d.city,
                regiao: d.region,
                pais: d.country
            };
        },

        async () => {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            if (!d.ip) throw new Error("ipapi falhou");
            return {
                ip: d.ip,
                cidade: d.city,
                regiao: d.region,
                pais: d.country_name
            };
        },

        async () => {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            if (!d.ip) throw new Error("ipify falhou");

            return {
                ip: d.ip,
                cidade: "Desconhecida",
                regiao: "N/A",
                pais: "N/A"
            };
        }
    ];

    for (const tentar of fontes) {
        try {
            return await tentar();
        } catch (e) {
            console.warn("Fonte falhou:", e.message);
        }
    }

    throw new Error("Todas APIs falharam");
}

// 🚀 EXECUÇÃO
async function rodarTeste() {
    const resDiv = document.getElementById('resultado');

    let dados;

    // PASSO 1
    try {
        dados = await obterLocalizacaoREAL();

        if (!dados.ip || dados.ip === "0.0.0.0") {
            throw new Error("IP inválido");
        }

        document.getElementById('passo1').innerHTML =
            `✅ IP: ${dados.ip} | ${dados.cidade}`;

    } catch (e) {
        document.getElementById('passo1').innerHTML =
            "❌ ERRO REAL: " + e.message;

        resDiv.innerHTML = "❌ TESTE CANCELADO (sem geo)";
        resDiv.style.color = "red";
        return;
    }

    // PASSO 2
    try {
        document.getElementById('passo2').innerHTML =
            "⏳ Gravando no banco...";

        const { error } = await supabase
        .from('access_logs')
        .insert([{
            user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8',
            ip_address: dados.ip,
            city: dados.cidade,
            region: dados.regiao,
            country: dados.pais
        }]);

        if (error) throw error;

        resDiv.innerHTML = "🚀 SUCESSO REAL (gravado no banco)";
        resDiv.style.color = "#2ecc71";

    } catch (err) {
        resDiv.innerHTML = "❌ ERRO BANCO: " + err.message;
        resDiv.style.color = "red";
    }
}

rodarTeste();
</script>

</body>
</html>
