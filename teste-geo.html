<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Segurança Invisível - Supabase</title>
</head>
<body style="background:#000; color:#0ff; font-family:monospace; padding:20px;">

<h3>SLA - RASTREAMENTO PASSIVO</h3>
<div id="passo1">1. Identificando Conexão (Invisível)...</div>
<div id="passo2">2. Sincronizando com Supabase...</div>
<hr>
<div id="resultado" style="color:#f1c40f">Aguardando...</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

async function segurancaSilenciosa() {
    const resDiv = document.getElementById('resultado');
    const p1 = document.getElementById('passo1');
    const p2 = document.getElementById('passo2');

    let dadosLogs = { ip: '0.0.0.0', cidade: 'Desconhecida', regiao: 'N/A', pais: 'BR' };

    try {
        p1.innerHTML = "⏳ Rastreando origem...";
        
        // Esta API é excelente porque não costuma dar erro de CORS em domínios GitHub
        const res = await fetch('https://ipapi.co/json/');
        if (!res.ok) throw new Error("Erro na API");
        
        const data = await res.json();
        dadosLogs = {
            ip: data.ip,
            cidade: data.city,
            regiao: data.region,
            pais: data.country_name
        };
        p1.innerHTML = `✅ ORIGEM: ${dadosLogs.cidade}, ${dadosLogs.regiao}`;

    } catch (e) {
        p1.innerHTML = "⚠️ FALLBACK: Usando Rota de Emergência...";
        // Se a primeira falhar (DNS/CORS), tentamos a segunda opção silenciosa
        try {
            const res2 = await fetch('https://api.db-ip.com/v2/free/self');
            const data2 = await res2.json();
            dadosLogs.ip = data2.ipAddress;
            dadosLogs.cidade = data2.city || "Via DB-IP";
            dadosLogs.regiao = data2.stateProv || "SP";
        } catch(e2) {
            p1.innerHTML = "❌ FALHA TOTAL DE GEO";
        }
    }

    // GRAVAÇÃO NO BANCO (Não importa se a Geo falhou, o log é criado)
    try {
        p2.innerHTML = "⏳ Gravando log de acesso...";
        const { error } = await supabase.from('access_logs').insert([{
            user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8',
            ip_address: dadosLogs.ip,
            city: dadosLogs.cidade,
            region: dadosLogs.regiao,
            country: dadosLogs.pais
        }]);

        if (error) throw error;
        resDiv.innerHTML = `🚀 SUCESSO! Log gravado para: ${dadosLogs.cidade}`;
        resDiv.style.color = "#2ecc71";
    } catch (err) {
        resDiv.innerHTML = "❌ ERRO SUPABASE: " + err.message;
    }
}

segurancaSilenciosa();
</script>
</body>
</html>
