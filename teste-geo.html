<div id="painel" style="background:#000; color:#0ff; padding:20px; font-family:monospace; font-size:18px;">
    <h3>SLA - LABORATÓRIO DE CONEXÃO</h3>
    <div id="passo1">1. Testando IP e Localização...</div>
    <div id="passo2">2. Testando Gravação no Supabase...</div>
    <hr>
    <div id="resultado" style="color:#f1c40f">Aguardando...</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://ymyxikhlhkkvcufgwufe.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

async function obterLocalizacaoREAL() {
    try {
        // 🔥 MESMO PADRÃO DO SEU SISTEMA REAL
        let response = await fetch('https://visapi-tau.vercel.app/api/ip');

        if (!response.ok) {
            response = await fetch('https://ipapi.co/json/');
        }

        const data = await response.json();

        return {
            ip: data.ip,
            cidade: data.city,
            regiao: data.region,
            pais: data.country_name || 'Brasil'
        };

    } catch (e) {
        throw new Error("Falha TOTAL na geolocalização");
    }
}

async function rodarTeste() {
    const resDiv = document.getElementById('resultado');

    let dados;

    // PASSO 1
    try {
        dados = await obterLocalizacaoREAL();

        if (!dados.ip) throw new Error("Sem IP válido");

        document.getElementById('passo1').innerHTML =
            "✅ IP REAL: " + dados.ip + " | " + dados.cidade;

    } catch (e) {
        document.getElementById('passo1').innerHTML =
            "❌ FALHA REAL: " + e.message;

        resDiv.innerHTML = "❌ TESTE CANCELADO (sem geolocalização)";
        resDiv.style.color = "red";
        return; // 🔥 TRAVA TOTAL (sem fallback fake)
    }

    // PASSO 2
    try {
        document.getElementById('passo2').innerHTML = "⏳ Gravando no banco...";

        const { error } = await supabase
        .from('access_logs')
        .insert([{
            user_id: '91da3541-bbaf-4bb6-bd35-ad4dd93821b8',
            ip_address: dados.ip,
            city: dados.cidade,
            region: dados.regiao,
            country: dados.pais
        }]);

        if (error) {
            throw error;
        }

        resDiv.innerHTML = "🚀 SUCESSO REAL (IP + LOCAL gravados)";
        resDiv.style.color = "#2ecc71";

    } catch (err) {
        resDiv.innerHTML = "❌ ERRO BANCO: " + err.message;
        resDiv.style.color = "red";
    }
}

rodarTeste();
</script>
