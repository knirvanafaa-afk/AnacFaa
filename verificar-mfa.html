<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SLA - Verificação de Segurança</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 800px; height: 550px; background: white; padding: 50px; border-radius: 25px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); border: 2px solid #f1c40f; }
        h2 { text-align: center; color: #333; text-transform: uppercase; font-size: 40px; }
        input { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 40px; text-align: center; letter-spacing: 5px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; background-color: #27ae60; color: white; font-size: 25px; }

    </style>
</head>
<body>

<div id="custom-alert" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #fff9c4; border: 3px solid #f1c40f; padding: 40px; border-radius: 25px; max-width: 850px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <p id="alert-message" style="color: #333; font-weight: bold; font-size: 40px; margin-bottom: 25px;"></p>
        <button onclick="fecharAlerta()" style="background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 35px; font-weight: bold; text-transform: uppercase;">OK</button>
    </div>
</div>

<div class="container">
    <h2>Código de Segurança</h2>
    <p style="text-align:center; color:#666; font-size: 35px;">Abra seu Authenticator e digite os 6 números.</p>
    <input type="text" id="codigo-mfa" maxlength="6" placeholder="000000">
    <button onclick="validarAcesso()">Confirmar Entrada</button>
</div>

<div id="overlaySeguranca" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; color: white;">
    <div class="spinner" style="border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #f1c40f; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    <p style="font-size: 20px; font-weight: bold; text-align: center; max-width: 80%;">Finalizando verificação de segurança...</p>
</div>

<style>
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Ajuste a importação para incluir as novas funções
import { 
    analisarSeguranca, 
    registrarDispositivo, 
    validarDispositivoConhecido 
} from './seguranca.js';

    const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

    // Funções de controle do alerta amarelo (Mesmo padrão das outras páginas)
    window.fecharAlerta = () => document.getElementById('custom-alert').style.display = 'none';
    
    window.mostrarMensagem = (msg) => {
        document.getElementById('alert-message').innerText = msg;
        document.getElementById('custom-alert').style.display = 'flex';
    };

    window.validarAcesso = async () => {
        const codigo = document.getElementById('codigo-mfa').value;
        const { data: factors } = await supabase.auth.mfa.listFactors();
        
        if (!factors || !factors.totp || factors.totp.length === 0) {
            mostrarMensagem("Erro: MFA não configurado.");
            return;
        }

        const factorId = factors.totp[0].id;
        const { error } = await supabase.auth.mfa.challengeAndVerify({
            factorId: factorId,
            code: codigo
        });

        if (error) {
            mostrarMensagem("Código incorreto!");
            return;
        }

document.getElementById('codigo-mfa').value = ''; 

// --- INÍCIO DA VALIDAÇÃO DE DISPOSITIVO (PASSKEY) ---
        try {
            mostrarOverlaySeguranca();
            
            const { data: { session } } = await supabase.auth.getSession();
            const user = session.user;
            
            // 1. Registra IP/Cidade e analisa comportamento
            await analisarSeguranca(user.id);

            // 2. Tenta validar se o aparelho já é conhecido (Silencioso)
            const check = await validarDispositivoConhecido(user.id);

            if (check.status === 'reconhecido') {
                console.log("Aparelho reconhecido. Acesso liberado silenciosamente.");
            } 
            else {
                // 3. Se for novo ou desconhecido, EXIGE a digital/PIN
                console.log("Aparelho novo detectado. Solicitando biometria...");
                
                // Atualiza o texto do overlay para avisar o usuário
                const pTexto = document.querySelector("#overlaySeguranca p");
                if (pTexto) pTexto.innerText = "Novo dispositivo detectado. Confirme sua identidade para vincular este aparelho.";

                const cadastrou = await registrarDispositivo(user.id);
                
                if (!cadastrou) {
                    esconderOverlaySeguranca();
                    mostrarMensagem("Acesso negado: É necessário validar a biometria/PIN neste novo aparelho.");
                    return; // TRAVA O LOGIN AQUI
                }
            }
        } catch (err) {
            console.warn("Falha na verificação de dispositivo (Seguindo por segurança):", err);
            // Se o sistema de passkey falhar por bug, ele apenas segue o fluxo original
        }
        // --- FIM DA VALIDAÇÃO ---

        // Se o código estiver correto, checa o status do usuário
        const { data: { session } } = await supabase.auth.getSession();
        const { data: profile } = await supabase
            .from('profiles')
            .select('status_acesso, expira_em')
            .eq('id', session.user.id)
            .single();

        const estaExpirado = profile.expira_em && new Date(profile.expira_em) < new Date();
        const ehAdmin = profile.status_acesso === 'admin';
        const ehAtivo = (profile.status_acesso === 'beta' || profile.status_acesso === 'pago');

        // Lógica de Redirecionamento
        if (ehAdmin) {
            window.location.href = 'painel.html';
        } else if (ehAtivo && !estaExpirado) {
            window.location.href = 'dashboard.html';
        } else {
            // Lógica de Mensagens Específicas
            if (profile.status_acesso === 'pendente') {
                mostrarMensagem("Por favor, efetue o pagamento para ter acesso ao nosso conteúdo.");
            } else if (estaExpirado) {
                mostrarMensagem("Infelizmente seu período de assinatura expirou, renove sua inscrição.");
            } else {
                mostrarMensagem("Acesso negado. Entre em contato com o suporte.");
            }
            
            // Redireciona para o login após clicar em OK
            setTimeout(() => { window.location.href = 'planos.html'; }, 10000);
        }
    };

window.mostrarOverlaySeguranca = () => {
    const el = document.getElementById("overlaySeguranca");
    if (el) el.style.display = "flex";
};

window.esconderOverlaySeguranca = () => {
    const el = document.getElementById("overlaySeguranca");
    if (el) el.style.display = "none";
};

</script>
</body>
</html>
