<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SLA - Verificação de Segurança</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); border: 2px solid #f1c40f; }
        h2 { text-align: center; color: #333; text-transform: uppercase; font-size: 18px; }
        input { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 24px; text-align: center; letter-spacing: 5px; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; background-color: #27ae60; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>Código de Segurança</h2>
    <p style="text-align:center; color:#666;">Abra seu Authenticator e digite os 6 números.</p>
    <input type="text" id="codigo-mfa" maxlength="6" placeholder="000000">
    <button onclick="validarAcesso()">Confirmar Entrada</button>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Configuração única
const supabase = createClient('https://ymyxikhlhkkvcufgwufe.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlteXhpa2hsaGtrdmN1Zmd3dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTc4MTYsImV4cCI6MjA4NjQ5MzgxNn0.kcbbkKDx1Jt2ayX2KwJa0Pr8ZsGTj4BTxV1y2RXU9WA');

window.validarAcesso = async () => {
    const codigoInput = document.getElementById('codigo-mfa').value;
    
    if (!codigoInput || codigoInput.length < 6) {
        alert("Por favor, digite os 6 números do seu autenticador.");
        return;
    }

    try {
        // 1. Pega os fatores de MFA
        const { data: factors, error: factorsError } = await supabase.auth.mfa.listFactors();
        if (factorsError) throw factorsError;

        const totp = factors.totp[0];
        if (!totp) throw new Error("MFA não configurado corretamente.");

        // 2. Valida o código
        const { error: verifyError } = await supabase.auth.mfa.challengeAndVerify({
            factorId: totp.id,
            code: codigoInput
        });

        if (verifyError) {
            alert("Código incorreto ou expirado. Tente novamente.");
            return;
        }

        // 3. Se deu certo, busca o perfil para decidir para onde ir
        const { data: { session } } = await supabase.auth.getSession();
        
        const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('status_acesso, expira_em')
            .eq('id', session.user.id)
            .single();

        if (profileError) {
            alert("Erro ao identificar perfil.");
            return;
        }

        // 4. Redirecionamento Final
        const estaExpirado = profile.expira_em && new Date(profile.expira_em) < new Date();
        const ehAdmin = profile.status_acesso === 'admin';
        const ehAlunoAtivo = (profile.status_acesso === 'beta' || profile.status_acesso === 'pago') && !estaExpirado;

        if (ehAdmin) {
            window.location.href = 'painel.html';
        } else if (ehAlunoAtivo) {
            window.location.href = 'alunos.html';
        } else {
            alert("Seu acesso está pendente ou expirado. Entre em contato com o suporte.");
            window.location.href = 'index.html'; // Expulsa se não tiver permissão
        }

    } catch (err) {
        alert("Erro no sistema: " + err.message);
        console.error(err);
    }
};
</script>
</body>
</html>
